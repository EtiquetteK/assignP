# ===============================
# PostgreSQL Configuration (Heroku)
# ===============================
# Database configuration is handled by DataSourceConfiguration.java
# which parses the DATABASE_URL environment variable
# No need to configure datasource URL here

# PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable data initialization
app.init.data.enabled=true

# Logging
logging.level.org.springframework.boot.autoconfigure=DEBUG