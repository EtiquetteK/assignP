# ===============================
# PostgreSQL Configuration (Heroku)
# ===============================
# Heroku provides DATABASE_URL environment variable
# Spring Boot automatically configures datasource from DATABASE_URL for PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable data initialization for postgres profile
app.init.data.enabled=true