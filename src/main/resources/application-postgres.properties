# ===============================
# PostgreSQL Configuration (Heroku)
# ===============================
# Disable Spring's auto DataSource configuration - we provide our own
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Heroku provides DATABASE_URL environment variable
spring.datasource.driver-class-name=org.postgresql.Driver

# PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Enable data initialization for postgres profile
app.init.data.enabled=true