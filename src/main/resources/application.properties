spring.application.name=assignP
# ===============================
# Server Configuration
# ===============================
server.port=${PORT:8080}

# ===============================
# Database Configuration
# ===============================
# Default: H2 in-memory (for local development)
# Override with environment variables for MySQL/PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:assignpdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===============================
# H2 Console (for development)
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT Configuration
# ===============================
jwt.secret=loginanddie12345
jwt.expiration=3600000

# ===============================
# Logging
# ===============================
logging.level.org.springframework=INFO
logging.level.com.PracticalAssignment.assignP=DEBUG



