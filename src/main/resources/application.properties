spring.application.name=assignP
# ===============================
# Server Configuration
# ===============================
server.port=${PORT:8080}

# ===============================
# Database Configuration
# ===============================
# Local MySQL (default)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/assignp_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===============================
# JWT Configuration
# ===============================
jwt.secret=loginanddie12345
jwt.expiration=3600000

# ===============================
# Logging
# ===============================
logging.level.org.springframework=INFO
logging.level.com.PracticalAssignment.assignP=DEBUG



