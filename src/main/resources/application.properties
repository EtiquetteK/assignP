spring.application.name=assignP

# Profile is controlled by:
# - Local development: defaults to 'local' via Spring Boot convention
# - Heroku: set via Procfile with -Dspring.profiles.active=postgres (takes precedence)
# Do NOT set spring.profiles.active here - let JVM arguments and environment override

# ===============================
# Server Configuration
# ===============================
server.port=${PORT:8080}

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===============================
# Database Initialization
# ===============================
# Enable data initialization (seeding) by default - can be disabled with APP_INIT_DATA_ENABLED=false
app.init.data.enabled=${APP_INIT_DATA_ENABLED:true}

# ===============================
# JWT Configuration
# ===============================
jwt.secret=loginanddie12345
jwt.expiration=3600000

# ===============================
# Logging
# ===============================
logging.level.org.springframework=INFO
logging.level.com.PracticalAssignment.assignP=DEBUG