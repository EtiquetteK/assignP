<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Task Management SaaS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to content</a>
  <main class="container auth-shell" id="mainContent">
    <nav class="top-nav">
      <a class="button-link" href="index.html">Home</a>
      <a class="button-link" href="register.html">Register</a>
      <a class="button-link" href="dashboard.html">Dashboard</a>
    </nav>

    <section class="auth-brand">
      <h1>Welcome Back</h1>
      <p>Sign in to continue tracking work across Kanban, planner, and timeline views.</p>
    </section>

    <section class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <label for="username">Username</label>
        <input id="username" type="text" required />

        <label for="password">Password</label>
        <input id="password" type="password" required />

        <button type="submit">Sign In</button>
      </form>
      <p id="statusMessage" class="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="login.js"></script>
</body>
</html>
